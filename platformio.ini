; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp-wrover-kit]
platform = espressif32
board = esp-wrover-kit
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ./lib/sub_dirs
build_flags = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
lib_deps = vshymanskyy/TinyGSM@^0.12.0

[env:main]
build_src_filter = +<*> -<test_*.cpp>
lib_deps = vshymanskyy/TinyGSM@^0.12.0

[env:test_wifi]
build_src_filter = -<*> +<../test/test_wifi.cpp>
lib_deps = vshymanskyy/TinyGSM@^0.12.0

[env:test_gps]
build_src_filter = -<*> +<../test/test_gps.cpp>
lib_deps = vshymanskyy/TinyGSM@^0.12.0

[env:test_relay]
build_src_filter = -<*> +<../test/test_relay.cpp>

[env:test_adc]
build_src_filter = -<*> +<../test/test_adc.cpp>
